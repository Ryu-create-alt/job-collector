name: 社内NWエンジニア求人収集

on:
  schedule:
    # 平日（月〜金）JST 9:00 = UTC 0:00
    - cron: '0 0 * * 1-5'
    # 土日 JST 9:00 = UTC 0:00
    - cron: '0 0 * * 6,0'
  workflow_dispatch:
    inputs:
      batch_size:
        description: '取得する企業数'
        required: false
        default: '10'

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: バッチサイズ決定（平日10社・土日20社）
        id: batch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "size=${{ github.event.inputs.batch_size }}" >> $GITHUB_OUTPUT
          else
            DAY=$(date +%u)   # 1=月 ... 5=金 / 6=土 / 7=日
            if [ "$DAY" -ge 6 ]; then
              echo "size=20" >> $GITHUB_OUTPUT
            else
              echo "size=10" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 求人収集実行
        run: python run.py --batch-size ${{ steps.batch.outputs.size }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 変更をコミット & プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jobs.db config/progress.json
          git diff --staged --quiet || git commit -m "auto: job collection $(date +'%Y-%m-%d') [skip ci]"
          git push
